name: Build xfce-linux

# Mirrors the tromso CASD pattern: runs bst2 inside a container on the runner,
# exports the OCI image, and pushes to ghcr.io/hanthor/xfce-linux.

on:
  workflow_dispatch:
    inputs:
      push_image:
        description: 'Push OCI image to GHCR'
        type: boolean
        default: true
  schedule:
    # Daily at 05:00 UTC
    - cron: '0 5 * * *'
  push:
    branches: [main]
    paths:
      - 'elements/**'
      - 'files/**'
      - 'patches/**'
      - 'include/**'
      - 'project.conf'
      - '.github/workflows/build-and-publish-xfce-linux.yml'

env:
  IMAGE_NAME: xfce-linux
  IMAGE_REGISTRY: ghcr.io/${{ github.repository_owner }}
  BST_TARGET: oci/xfce-linux.bst
  BST2_IMAGE: registry.gitlab.com/freedesktop-sdk/infrastructure/freedesktop-sdk-docker-images/bst2:latest

concurrency:
  group: casd-xfce-linux-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    # Use a self-hosted runner if ACTIONS_RUNNER_LABEL repo variable is set,
    # otherwise fall back to GitHub-hosted ubuntu-24.04.
    runs-on: ${{ vars.ACTIONS_RUNNER_LABEL || 'ubuntu-24.04' }}
    timeout-minutes: 1440
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Just
        run: |
          JUST_VERSION=$(curl -s https://api.github.com/repos/casey/just/releases/latest | grep '"tag_name"' | cut -d'"' -f4)
          curl -fsSL "https://github.com/casey/just/releases/download/${JUST_VERSION}/just-${JUST_VERSION}-x86_64-unknown-linux-musl.tar.gz" \
            | sudo tar -xz -C /usr/local/bin just
          just --version

      - name: Free disk space
        if: runner.environment == 'github-hosted'
        uses: ublue-os/remove-unwanted-software@v9
        continue-on-error: true

      - name: Pull bst2 image
        run: podman pull "$BST2_IMAGE"

      - name: Cache BST sources
        uses: actions/cache@v4
        with:
          path: ~/.cache/buildstream/sources
          key: bst-sources-xfce-linux-v1-${{ hashFiles('elements/**/*.bst') }}
          restore-keys: bst-sources-xfce-linux-v1-

      - name: Write BuildStream CI config
        run: |
          mkdir -p logs
          cat > buildstream-ci.conf << EOF
          scheduler:
            on-error: continue
            fetchers: 32
            builders: 12
            network-retries: 5
          logging:
            message-format: '[%{wallclock}][%{elapsed}][%{key}][%{element}] %{action} %{message}'
            error-lines: 80
          cachedir: /root/.cache/buildstream
          logdir: /src/logs
          build:
            retry-failed: True
          cache:
            cache-buildtrees: never
          EOF

      - name: Build ${{ env.BST_TARGET }}
        env:
          BST_FLAGS: --no-interactive --config /src/buildstream-ci.conf
        run: just bst build "$BST_TARGET"

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-xfce-linux
          path: logs/
          retention-days: 7
          if-no-files-found: ignore

      - name: Capture build timestamp
        id: timestamp
        run: echo "created=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_OUTPUT

      - name: Export OCI image
        env:
          BUILD_IMAGE_NAME: ${{ env.IMAGE_NAME }}
          OCI_IMAGE_REVISION: ${{ github.sha }}
          OCI_IMAGE_VERSION: ${{ github.ref_name }}
          OCI_IMAGE_CREATED: ${{ steps.timestamp.outputs.created }}
          BST_FLAGS: --no-interactive --config /src/buildstream-ci.conf
        run: just export

      - name: Verify image
        run: just lint

      - name: Login to GHCR
        if: ${{ github.event_name != 'pull_request' && inputs.push_image != false }}
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | \
            sudo podman login ghcr.io --username "${{ github.actor }}" --password-stdin

      - name: Push to GHCR
        if: ${{ github.event_name != 'pull_request' && inputs.push_image != false }}
        run: |
          DATE_TAG=$(date -u +%Y%m%d)
          for tag in latest "$DATE_TAG" "${{ github.sha }}"; do
            sudo podman tag "${IMAGE_NAME}:latest" "${IMAGE_REGISTRY}/${IMAGE_NAME}:${tag}"
            for attempt in 1 2 3; do
              sudo podman push "${IMAGE_REGISTRY}/${IMAGE_NAME}:${tag}" && break
              echo "Push attempt ${attempt} failed, retrying…"; sleep 5
            done
          done
          echo "Pushed ${IMAGE_REGISTRY}/${IMAGE_NAME}:{latest,${DATE_TAG},${{ github.sha }}}"

      - name: Verify published image
        if: ${{ github.event_name != 'pull_request' && inputs.push_image != false }}
        run: |
          sudo podman pull "${IMAGE_REGISTRY}/${IMAGE_NAME}:latest"
          sudo podman inspect "${IMAGE_REGISTRY}/${IMAGE_NAME}:latest" \
            --format '{{.RepoDigests}} labels={{.Labels}}' | head -5
          echo "✅ Image verified at ${IMAGE_REGISTRY}/${IMAGE_NAME}:latest"

      - name: Build summary
        if: always()
        run: |
          echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Target**: \`${BST_TARGET}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Image**: \`${IMAGE_REGISTRY}/${IMAGE_NAME}:latest\`" >> $GITHUB_STEP_SUMMARY
