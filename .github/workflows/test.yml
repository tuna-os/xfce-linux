name: Test

on:
  pull_request:
    paths:
      - 'scripts/**'
      - 'xfce-linux/src/**'
      - 'tests/**'
      - 'build-xfwl4.sh'
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install BATS
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq bats

      - name: Run BATS tests
        run: |
          echo "=== BATS Tests ==="
          FAILED=0
          for f in tests/bats/*.bats; do
            [[ -f "$f" ]] || continue
            echo "  Running: $f"
            bats --formatter tap "$f" || FAILED=1
          done
          exit $FAILED

      - name: Python syntax check
        run: |
          echo "=== Python Syntax Check ==="
          for f in scripts/*.py tools/*.py; do
            [[ -f "$f" ]] || continue
            echo "  Checking: $f"
            python3 -m py_compile "$f"
          done

      - name: Install pytest
        run: |
          sudo apt-get install -y -qq python3-pytest 2>/dev/null || pip3 install --user pytest 2>/dev/null || true

      - name: Run pytest tests
        shell: bash
        run: |
          echo "=== Pytest Tests ==="
          FAILED=0
          if python3 -m pytest --version &>/dev/null; then
            if ls tests/pytest/*.py &>/dev/null; then
              python3 -m pytest tests/pytest/ -v --tb=short || FAILED=1
            else
              echo "  No pytest test files found"
            fi
          else
            echo "  pytest not available — skipping"
          fi
          exit $FAILED

      - name: Test summary
        if: always()
        run: |
          echo "| Type | Files |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| BATS | $(find tests/bats -name '*.bats' -type f | wc -l) |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Python | $(find tests/pytest -name '*.py' -type f 2>/dev/null | wc -l) |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Run locally: \`bats tests/bats/*.bats\`" >> "$GITHUB_STEP_SUMMARY"
          echo "Run locally: \`python3 -m pytest tests/pytest/ -v\`" >> "$GITHUB_STEP_SUMMARY"
